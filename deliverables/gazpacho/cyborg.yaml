type: service
cycle-highlights:
  - |
    Cyborg services have migrated to native Python threading, modernising
    the service architecture and positioning the project for long-term
    sustainability within the OpenStack ecosystem.
  - |
    The cyborg-agent now validates its Placement resource provider at
    startup with automatic retry and backoff, and supports explicit
    resource provider naming to simplify deployments where accelerator
    and compute hostnames differ.
  - |
    Cyborg has adopted current oslo.db database APIs, aligning the
    project's data layer with the wider OpenStack ecosystem and ensuring
    continued long-term supportability.
  - |
    A new driver configuration guide covers all supported accelerator
    types — FPGA, GPU, NIC, QAT, SSD, and PCI passthrough — providing
    ready-to-use configuration examples for common deployments.
