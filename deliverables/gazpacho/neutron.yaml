cycle-highlights:
  - Network IP availability details API extension was added which
    provides more information on IP usage in subnets and
    allocation pools.
  - OVN BGP capabilities have been integrated into the Neutron OVN
    driver.
  - Additional OVN config options were added to better support
    scalability.
  - ML2/OVN now supports North/South routing for extenal (SR-IOV,
    baremetal) ports.
  - ML2/OVN now supports allowed address pairs with virtual MAC
    addresses.
